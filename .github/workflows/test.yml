name: Full Stack CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # Job 1: ทดสอบ Backend (Jest + MongoDB)
  # ==========================================
  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest
    
    # จำลอง Database สำหรับ Integration Test
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: 🧪 Run Backend Tests (Jest)
        working-directory: ./backend
        run: npm test
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/test_db
          JWT_SECRET: github_actions_secret_key_12345
          PORT: 5000

  # ==========================================
  # Job 2: ทดสอบ Frontend (Playwright E2E)
  # ==========================================
  frontend-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest

    # 🌟 เพิ่ม MongoDB Service สำหรับให้ Backend รันตอนเทสต์ Frontend
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 🌟 ติดตั้งและรัน Backend Server ใน Background เพื่อให้ Frontend มี API เรียกใช้
      - name: 📦 Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: 🚀 Start Backend Server
        working-directory: ./backend
        run: node server.js &
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/test_db
          JWT_SECRET: github_actions_secret_key_12345
          PORT: 5000
          # 🌟 เผื่อ Backend ฝั่งคุณมีการเช็ค CORS origin
          FRONTEND_URL: http://localhost:3000 

      - name: ⏳ Wait for Backend to be ready
        # 🌟 บังคับให้รอจนกว่า Backend พอร์ต 5000 จะเปิดเสร็จ ไม่งั้น Frontend จะ API พังตั้งแต่เสี้ยววิแรก
        run: npx wait-on tcp:5000 

      - name: 📦 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: 🌐 Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: 🎭 Run Playwright E2E Tests
        working-directory: ./frontend
        run: npx playwright test

      # เก็บ Report ของ Playwright ไว้ดูใน GitHub กรณีที่เทสต์พัง (หรือผ่าน)
      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7