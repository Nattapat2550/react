name: Full Stack CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ==========================================
  # Job 1: ทดสอบ Backend (Jest + MongoDB)
  # ==========================================
  backend-tests:
    name: Backend API Tests
    runs-on: ubuntu-latest
    
    # จำลอง Database สำหรับ Integration Test
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: 📦 Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: 🧪 Run Backend Tests (Jest)
        working-directory: ./backend
        run: npm test
        env:
          # ส่งตัวแปร Environment ให้ Jest ตอนเทสต์
          MONGO_URI: mongodb://127.0.0.1:27017/test_db
          JWT_SECRET: github_actions_secret_key_12345
          PORT: 5000

  # ==========================================
  # Job 2: ทดสอบ Frontend (Playwright E2E)
  # ==========================================
  frontend-tests:
    name: Frontend E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: 🌐 Install Playwright Browsers
        working-directory: ./frontend
        # ติดตั้งเบราว์เซอร์ที่จำเป็น (Chromium, Firefox, WebKit) พร้อม Dependencies ของ OS
        run: npx playwright install --with-deps

      - name: 🎭 Run Playwright E2E Tests
        working-directory: ./frontend
        run: npx playwright test

      # เก็บ Report ของ Playwright ไว้ดูใน GitHub กรณีที่เทสต์พัง (หรือผ่าน)
      - name: 📊 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always() # บังคับให้อัปโหลดแม้ว่าเทสต์จะ fail ก็ตาม
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7