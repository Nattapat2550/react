name: Backend API Tests

# จะทำงานเมื่อมีการ Push โค้ดขึ้น branch main หรือมีการเปิด Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    # ❌ ลบ services: postgres ออกไปได้เลย เพราะเรา Mock DB ไว้ใน testHelper.js แล้ว

    steps:
      # 1. ดึงโค้ดล่าสุดของคุณจาก GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. ติดตั้ง Node.js เวอร์ชัน 18 (ตาม package.json ของคุณ)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. ติดตั้ง Dependencies ในโฟลเดอร์ backend
      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run tests
        run: npm test
        working-directory: backend
      # ❌ ลบขั้นตอน Initialize Database (psql) ออกไปได้เลย ไม่ต้องใช้แล้ว

      # 4. สั่งรันคำสั่ง npm run test 
      - name: Run Jest Tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          PORT: 5000
          # ใส่เป็นค่า Dummy ไว้ได้เลย เพราะระบบจะถูกดักจับด้วย Mock fetch แทน
          PURE_API_BASE_URL: https://mock-api.local
          PURE_API_KEY: mock-key-123
          JWT_SECRET: super_secret_test_key
        run: npm run test
