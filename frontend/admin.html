<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <header class="topbar">
    <button id="themeToggle" aria-label="Toggle theme">🌓</button>
  </header>
  <main class="container">
    <h2>Admin</h2>
    <img id="avatar" src="images/user.png" alt="avatar" width="64" height="64"/>
    <p id="uname"></p>

    <section>
      <h3>Users</h3>
      <table id="usersTable">
        <thead><tr><th>ID</th><th>Email</th><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
      <p id="msg" class="muted"></p>
    </section>

    <section>
      <h3>Homepage content</h3>
      <form id="homeForm">
        <input id="section" placeholder="section_name (e.g., welcome_header)" required/>
        <textarea id="content" placeholder="content"></textarea>
        <button class="btn" type="submit">Save</button>
      </form>
    </section>
  </main>
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
